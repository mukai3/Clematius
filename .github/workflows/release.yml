name: Release

# v* タグ（例: v1.0.0）を push すると、ビルド→zip→GitHub Release を自動作成する。
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write # gh release create に必要

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # MinVer がタグ履歴からバージョンを採番するため全履歴を取得

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish (framework-dependent, win-x64)
        shell: pwsh
        # バージョンは MinVer が push されたタグ(例 v0.4 → 0.4.0)から自動採番する。
        run: |
          dotnet publish src/Clematius/Clematius.csproj `
            -c Release -r win-x64 --self-contained false `
            -p:DebugType=none `
            -o publish

      - name: Package
        shell: pwsh
        run: Compress-Archive -Path publish/* -DestinationPath "Clematius-${{ github.ref_name }}-win-x64.zip"

      - name: Create GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" `
            "Clematius-${{ github.ref_name }}-win-x64.zip" `
            --title "${{ github.ref_name }}" `
            --generate-notes
