name: Release

# v* タグ（例: v1.0.0）を push すると、ビルド→zip→GitHub Release を自動作成する。
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write # gh release create に必要

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish (framework-dependent, win-x64)
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart('v')
          dotnet publish src/Clemotius/Clemotius.csproj `
            -c Release -r win-x64 --self-contained false `
            -p:DebugType=none -p:Version=$version `
            -o publish

      - name: Package
        shell: pwsh
        run: Compress-Archive -Path publish/* -DestinationPath "Clemotius-${{ github.ref_name }}-win-x64.zip"

      - name: Create GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" `
            "Clemotius-${{ github.ref_name }}-win-x64.zip" `
            --title "${{ github.ref_name }}" `
            --generate-notes
